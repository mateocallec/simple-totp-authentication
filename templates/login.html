<!DOCTYPE html>
<html lang="en">

<head>
    <title>Login</title>

    <link rel="stylesheet" href="/static/styles.css" />
</head>

<body>
    <div class="content">
        <h2>Login</h2>

        <form method="POST">
            <label>Username:</label>
            <input type="text" name="username" required>

            <label>OTP:</label>
            <input type="text" name="otp" required>

            <button type="submit">Login</button>
        </form>

        <hr>

        <a href="/register">Register</a>
    </div>
</body>

</html>
